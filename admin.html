<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEOPICTURE | Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif;}
body {background:#0e0e0e; color:#fff; padding:20px;}

/* TITRES */
h1,h2 {text-align:center;color:#ff9800;margin-bottom:20px;}

/* LOGIN BOX */
.login-box {
  max-width:400px; margin:50px auto; background:#1a1a1a; padding:30px;
  border-radius:15px; border:2px solid #ff9800; box-shadow:0 0 20px #ff9800;
  text-align:center;
}
.login-box input {width:80%; padding:12px; border-radius:8px; border:1px solid #555;
  background:#222; color:#fff; margin:10px 0; font-size:14px; outline:none; transition:0.3s;}
.login-box input:focus {border-color:#ff9800;}
.login-box button {padding:12px 25px; background:#ff9800; color:#fff; border:none; border-radius:25px; cursor:pointer; font-weight:500; transition:0.3s;}
.login-box button:hover {background:#ffc107; transform:scale(1.05);}

/* DASHBOARD */
#adminPanel {max-width:1200px; margin:20px auto;}
.filters {display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-bottom:20px;}
.filters select, .filters input {padding:8px 12px; border-radius:8px; border:1px solid #555; background:#222; color:#fff; outline:none; transition:.3s;}
.filters select:focus, .filters input:focus {border-color:#ff9800;}
#liste {display:flex; flex-wrap:wrap; gap:20px; justify-content:center;}

/* CARDS */
.card {background:#1a1a1a; border:2px solid #ff9800; border-radius:15px; padding:20px; width:280px; transition: transform 0.3s, box-shadow 0.3s; position:relative; box-shadow:0 0 10px #ff9800;}
.card:hover {transform:translateY(-5px) scale(1.03); box-shadow:0 5px 20px #ff9800;}
.card p {margin-bottom:8px; font-size:14px; color:#ddd;}
.card p b {color:#fff;}
.card .btn {margin-top:10px; padding:8px 15px; border:none; border-radius:20px; cursor:pointer; font-weight:500; transition:0.3s;}
.card .btn.whatsapp {background:#25D366; color:#fff;}
.card .btn.whatsapp:hover {background:#20b450; transform:scale(1.05);}
.card .btn.delete {background:#ff3b3b; color:#fff;}
.card .btn.delete:hover {background:#ff5555; transform:scale(1.05);}

/* RESPONSIVE */
@media(max-width:768px) {
  #liste {flex-direction:column; align-items:center;}
  .card {width:90%;}
  .login-box {width:90%; padding:25px;}
}
.btn i {
  margin-right: 8px;
}
</style>
</head>
<body>

<h1>Admin TEOPICTURE</h1>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
  <h2>Connexion</h2>
  <input type="text" id="adminUser" placeholder="Nom d'utilisateur" required>
  <input type="password" id="adminPass" placeholder="Mot de passe" required>
  <button onclick="loginAdmin()">Se connecter</button>
</div>

<!-- DASHBOARD -->
<div id="adminPanel" style="display:none;">
  <h2>Liste des réservations</h2>

  <!-- FILTRES -->
  <div class="filters">
    <input type="date" id="filterDate">
    <select id="filterEvent">
      <option value="">Tous les événements</option>
      <option value="Mariage">Mariage</option>
      <option value="Anniversaire">Anniversaire</option>
      <option value="Baptême">Baptême</option>
      <option value="Shooting">Shooting</option>
      <option value="Korite">Korite</option>
      <option value="Tabaski">Tabaski</option>
    </select>
    <button onclick="applyFilters()">Filtrer</button>
  </div>

  <!-- LISTE RESERVATIONS -->
  <div id="liste"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCP3ruoYjCeRTUBhRVsbRzi-R2UtNmrxGs",
  authDomain: "teopicture-ca10f.firebaseapp.com",
  projectId: "teopicture-ca10f",
  storageBucket: "teopicture-ca10f.firebasestorage.app",
  messagingSenderId: "205836454272",
  appId: "1:205836454272:web:e7c4b001049d03972bd965"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= LOGIN ADMIN
function loginAdmin(){
  const user = document.getElementById("adminUser").value;
  const pass = document.getElementById("adminPass").value;

  // Exemple simple : user=admin, pass=1234 (à sécuriser plus tard)
  if(user==="admin" && pass==="1234"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminPanel").style.display="block";
    chargerReservations();
  }else{
    alert("Identifiants incorrects !");
  }
}

// ================= CHARGER RESERVATIONS
let reservations = [];
function chargerReservations(){
  db.collection("reservations").orderBy("createdAt","desc").get().then(snapshot=>{
    reservations=[];
    snapshot.forEach(doc=>{
      reservations.push({id:doc.id, ...doc.data()});
    });
    afficherReservations(reservations);
  });
}

// ================= AFFICHER CARDS
function afficherReservations(data){
  const liste = document.getElementById("liste");
  liste.innerHTML="";
  if(data.length===0){
    liste.innerHTML="<p>Aucune réservation.</p>";
    return;
  }
  data.forEach(r=>{
    const card = document.createElement("div");
    card.classList.add("card");
    card.innerHTML=`
      <p><b>Nom :</b> ${r.nom}</p>
      <p><b>Téléphone :</b> ${r.telephone}</p>
      <p><b>Événement :</b> ${r.evenement}</p>
      <p><b>Date :</b> ${r.date}</p>
<p><b>Heure :</b> ${r.heure || '-'}</p>
      <p><b>Lieu :</b> ${r.lieu}</p>
      <p><b>Message :</b> ${r.message||'-'}</p>
      <button class="btn whatsapp" onclick="appeler('${r.telephone}')">
  <i class="fa-solid fa-phone"></i> Appeler
</button>
      <button class="btn delete" onclick="supprimer('${r.id}')">Supprimer</button>
    `;
    liste.appendChild(card);
  });
}

// ================= FILTRES
function applyFilters(){
  const date = document.getElementById("filterDate").value;
  const eventType = document.getElementById("filterEvent").value;

  let filtered = reservations;
  if(date) filtered = filtered.filter(r=>r.date===date);
  if(eventType) filtered = filtered.filter(r=>r.evenement===eventType);
  afficherReservations(filtered);
}

// ================= WHATSAPP
function whatsapp(tel, nom, evenement, date, heure, lieu, msg){
  const texte =
    `📸 *RÉSERVATION*\n\n` +
    `Nom: ${nom}\n` +
    `Téléphone: ${tel}\n` +
    `Événement: ${evenement}\n` +
    `Date: ${date}\n` +
    `Heure: ${heure}\n` +
    `Lieu: ${lieu}\n` +
    `Message: ${msg}`;

  window.open(
    `https://wa.me/221${tel.replace(/\D/g,'')}?text=${encodeURIComponent(texte)}`,
    "_blank"
  );
}{
  const texte = `📸 *RÉSERVATION*\nNom: ${nom}\nTéléphone: ${tel}\nÉvénement: ${evenement}\nDate: ${date}\nLieu: ${lieu}\nMessage: ${msg}`;
  window.open(`https://wa.me/221${tel.replace(/\D/g,'')}?text=${encodeURIComponent(texte)}`,"_blank");
}

// ================= SUPPRIMER
function supprimer(id){
  if(confirm("Supprimer cette réservation ?")){
    db.collection("reservations").doc(id).delete().then(()=>{ 
      chargerReservations();
    });
  }
}
let currentDate = new Date();

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const monthYear = document.getElementById("monthYear");

  grid.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  monthYear.innerText =
    currentDate.toLocaleString("fr-FR", { month: "long", year: "numeric" });

  const firstDay = new Date(year, month, 1).getDay();
  const totalDays = new Date(year, month + 1, 0).getDate();

  // Décalage début
  for (let i = 0; i < firstDay; i++) {
    grid.innerHTML += "<div></div>";
  }

  for (let day = 1; day <= totalDays; day++) {
    let fullDate = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

    let div = document.createElement("div");
    div.classList.add("day");
    div.innerText = day;

    // 🔴 date réservée
    if (datesIndisponibles.some(d => d.startsWith(fullDate))) {
      div.classList.add("booked");
    } else {
      div.onclick = () => {
        document.getElementById("date").value = fullDate;

        document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));
        div.classList.add("selected");
      };
    }

    grid.appendChild(div);
  }
}

function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
}
function appeler(tel){
  window.location.href = "tel:+221" + tel.replace(/\D/g,'');
}
</script>

</body>
</html>
